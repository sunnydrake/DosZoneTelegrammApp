<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Loading game…</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    #loading {
      font-size: 1.2rem;
      color: #aaa;
    }

    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem;
    }

    #error h1 {
      font-size: 1.4rem;
      font-weight: 600;
    }

    #error p {
      font-size: 1rem;
      color: #aaa;
      max-width: 340px;
    }

    #error a.play-btn {
      display: inline-block;
      padding: 0.75rem 2.25rem;
      background: #4caf50;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    #error a.play-btn:active { opacity: 0.85; }

    #error a.back-link {
      font-size: 0.9rem;
      color: #4caf50;
      text-decoration: none;
    }

    #error a.back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Shown for a brief moment while the redirect is being prepared -->
  <div id="loading">🕹️ Loading game…</div>

  <!--
    Shown only when the ?slug= parameter is missing.
    When a valid slug is present the page immediately redirects to
    https://dos.zone/mobile/<slug>/ so this div is never visible.
  -->
  <div id="error" role="alert">
    <h1 id="error-title">🕹️ Game not found</h1>
    <p id="error-msg">No game was specified. Go back and choose a game.</p>
    <a id="direct-link" class="play-btn" href="#" target="_blank"
       rel="noopener" style="display:none">▶ Open in Browser</a>
    <a class="back-link" href="index.html">← Back to game list</a>
  </div>

  <script>
    (function () {
      var slug = new URLSearchParams(window.location.search).get('slug');

      function showError(title, msg, directUrl) {
        document.getElementById('loading').style.display = 'none';
        var errEl = document.getElementById('error');
        errEl.style.display = 'flex';
        if (title) document.getElementById('error-title').textContent = '🕹️ ' + title;
        if (msg)   document.getElementById('error-msg').textContent   = msg;
        if (directUrl) {
          var link = document.getElementById('direct-link');
          link.href = directUrl;
          link.style.display = 'inline-block';
        }
      }

      if (!slug) {
        showError(
          'Game not found',
          'No game slug was provided in the URL. Go back and choose a game.',
          null
        );
        return;
      }

      /*
        Redirect directly to the dos.zone mobile page.
        This is a top-level navigation inside Telegram's WebView, so
        dos.zone's X-Frame-Options / CSP headers do not apply — the page
        was previously blocked because it was loaded inside a nested iframe.
      */
      var dosZoneUrl = 'https://dos.zone/mobile/' + slug + '/';
      window.location.replace(dosZoneUrl);
    }());
  </script>

</body>
</html>
