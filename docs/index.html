<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DosZone Telegram Games</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    p {
      color: #aaa;
      font-size: 1rem;
      text-align: center;
      max-width: 400px;
    }

    .games {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 380px;
    }

    .games a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #eee;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.15s;
    }

    .games a:hover,
    .games a:focus {
      background: #2a2a2a;
      outline: 2px solid #4caf50;
      outline-offset: 2px;
    }

    .games .icon { font-size: 1.4rem; }

    footer {
      color: #555;
      font-size: 0.85rem;
      text-align: center;
    }

    footer a { color: #4caf50; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>🕹️ DosZone Telegram Games</h1>

  <p>Classic DOS games playable in your browser — with mobile touch controls.</p>

  <ul class="games">
    <li>
      <a href="dangerous-dave.html">
        <span class="icon">👻</span>
        Dangerous Dave in the Haunted Mansion (1991)
      </a>
    </li>
  </ul>

  <footer>
    Powered by <a href="https://dos.zone" target="_blank" rel="noopener">dos.zone</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/sunnydrake/DosZoneTelegrammApp" target="_blank" rel="noopener">GitHub</a>
  </footer>

</body>
</html>
